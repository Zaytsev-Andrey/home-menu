services:

  postgres:
    image: postgres:17.9
    container_name: recipe-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipe_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - home-menu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recipe_service_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - home-menu
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/config/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - home-menu
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.103.0
    container_name: victoriametrics
    restart: unless-stopped
    ports:
      - "8428:8428"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=7"
    volumes:
      - victoriametrics_data:/storage
    networks:
      - home-menu
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8428/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  vmagent:
    image: victoriametrics/vmagent:v1.103.0
    container_name: vmagent
    restart: unless-stopped
    depends_on:
      victoriametrics:
        condition: service_healthy
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yaml"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
    volumes:
      - ./docker/vmagent/config/prometheus.yaml:/etc/prometheus/prometheus.yaml
    networks:
      - home-menu

  grafana:
    image: grafana/grafana:12.3
    container_name: grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - home-menu
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  loki_data:
  victoriametrics_data:
  grafana_data:

networks:
  home-menu:
    name: home-menu-network
    driver: bridge